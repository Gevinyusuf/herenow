name: Deploy API Gateway

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api-gateway/**'
      - 'packages/shared/**'
  pull_request:
    paths:
      - 'apps/api-gateway/**'
      - 'packages/shared/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./apps/api-gateway
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./apps/api-gateway
        run: |
          python -m pytest tests/ || echo "No tests found, skipping..."

      - name: Build Docker image
        run: |
          docker build -t api-gateway:${{ github.sha }} -f ./apps/api-gateway/Dockerfile .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push image
        run: |
          docker tag api-gateway:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker tag api-gateway:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}

      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production server..."
          # Add your deployment command here
          # Example: ssh user@server "docker pull && docker-compose up -d"
